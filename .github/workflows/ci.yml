name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
      - feat/**
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: private-demo
            app_deployment_mode: private
            app_runtime_mode: demo
            app_enable_demo_data: "true"
            run_preflight: "true"
            smoke_command: ""
            extra_smoke_command: ""
            web_smoke_command: ""
            worker_dry_run: "false"
          - job_name: private-prod
            app_deployment_mode: private
            app_runtime_mode: staging
            app_enable_demo_data: "false"
            run_preflight: "true"
            smoke_command: "npm run smoke:release"
            extra_smoke_command: "npm run smoke:queue:redis && npm run smoke:business-db:postgres"
            web_smoke_command: "npm run smoke:web:private"
            worker_dry_run: "false"
          - job_name: saas-control-plane
            app_deployment_mode: saas
            app_runtime_mode: staging
            app_enable_demo_data: "false"
            run_preflight: "true"
            smoke_command: "npm run smoke:saas"
            extra_smoke_command: "npm run smoke:saas:postgres"
            web_smoke_command: "npm run smoke:web:saas"
            worker_dry_run: "false"
          - job_name: saas-tenant-worker
            app_deployment_mode: saas
            app_runtime_mode: staging
            app_enable_demo_data: "false"
            run_preflight: "false"
            smoke_command: ""
            extra_smoke_command: ""
            web_smoke_command: ""
            worker_dry_run: "true"
    env:
      APP_DEPLOYMENT_MODE: ${{ matrix.app_deployment_mode }}
      APP_RUNTIME_MODE: ${{ matrix.app_runtime_mode }}
      HOST: 127.0.0.1
      PORT: 4300
      JWT_SECRET: ci-jwt-secret-20260312-abcdefghijklmnopqrstuvwxyz
      APP_CONFIG_CIPHER_SECRET: ci-cipher-secret-20260312-abcdefghijklmnopqrstuvwxyz
      APP_INIT_ADMIN_USERNAME: ci-admin
      APP_INIT_ADMIN_PASSWORD: CiAdmin@20260312
      APP_INIT_ADMIN_DISPLAY_NAME: CI管理员
      APP_ENABLE_DEMO_DATA: ${{ matrix.app_enable_demo_data }}
      APP_METRICS_ENABLED: "true"
      APP_METRICS_TOKEN: ci-metrics-token-20260312
      APP_LOG_LEVEL: info
      APP_REQUEST_LOGGING_ENABLED: "true"
      APP_TRUST_PROXY: "false"
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run lint

      - name: 运行测试
        run: npm run test

      - name: 构建产物
        run: npm run build

      - name: 启动前检查
        if: matrix.run_preflight == 'true'
        run: npm run preflight

      - name: 发布烟测
        if: matrix.smoke_command != ''
        run: ${{ matrix.smoke_command }}

      - name: 企业基线联调
        if: matrix.extra_smoke_command != ''
        run: ${{ matrix.extra_smoke_command }}

      - name: 安装 Playwright Chromium
        if: matrix.web_smoke_command != ''
        run: npx playwright install --with-deps chromium

      - name: 浏览器烟测
        if: matrix.web_smoke_command != ''
        run: ${{ matrix.web_smoke_command }}

      - name: Worker 启动基线检查
        if: matrix.worker_dry_run == 'true'
        run: npm run worker:dry-run -w server
