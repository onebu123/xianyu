name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 && gh release delete "$TAG_NAME" --yes || true
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file docs/v2-release-notes.md \
            --latest \
            --verify-tag
