services:
  postgres:
    image: postgres:16-alpine
    container_name: sale-compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sale_compass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-with-password}
      POSTGRES_DB: ${POSTGRES_DB:-sale_compass_private}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sale_compass} -d ${POSTGRES_DB:-sale_compass_private}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sale-compass-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  sale-compass:
    build:
      context: .
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: sale-compass
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4300:4300'
    environment:
      APP_RUNTIME_MODE: ${APP_RUNTIME_MODE:-prod}
      APP_DEPLOYMENT_MODE: ${APP_DEPLOYMENT_MODE:-private}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-4300}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_JWT_EXPIRES_MINUTES: ${APP_JWT_EXPIRES_MINUTES:-480}
      APP_CONFIG_CIPHER_SECRET: ${APP_CONFIG_CIPHER_SECRET:-change-me-too}
      APP_LOGIN_MAX_ATTEMPTS: ${APP_LOGIN_MAX_ATTEMPTS:-10}
      APP_LOGIN_WINDOW_MINUTES: ${APP_LOGIN_WINDOW_MINUTES:-10}
      APP_PRIVILEGED_WRITE_LIMIT: ${APP_PRIVILEGED_WRITE_LIMIT:-60}
      APP_PRIVILEGED_WRITE_WINDOW_MINUTES: ${APP_PRIVILEGED_WRITE_WINDOW_MINUTES:-10}
      APP_DATA_ROOT: ${APP_DATA_ROOT:-/app/server/data}
      APP_DB_PATH: ${APP_DB_PATH:-/app/server/data/app.db}
      APP_LOG_ROOT: ${APP_LOG_ROOT:-/app/server/data/logs}
      APP_BACKUP_ROOT: ${APP_BACKUP_ROOT:-/app/server/data/backups}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/server/data/uploads}
      APP_ENABLE_DEMO_DATA: ${APP_ENABLE_DEMO_DATA:-false}
      APP_BACKGROUND_JOBS_MODE: ${APP_BACKGROUND_JOBS_MODE:-worker}
      APP_QUEUE_BACKEND: ${APP_QUEUE_BACKEND:-redis}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_REDIS_PREFIX: ${APP_REDIS_PREFIX:-sale-compass}
      APP_BUSINESS_DB_ENGINE: ${APP_BUSINESS_DB_ENGINE:-postgres}
      APP_BUSINESS_POSTGRES_URL: ${APP_BUSINESS_POSTGRES_URL:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_private}
      APP_CONTROL_PLANE_DB_ENGINE: ${APP_CONTROL_PLANE_DB_ENGINE:-postgres}
      APP_CONTROL_PLANE_POSTGRES_URL: ${APP_CONTROL_PLANE_POSTGRES_URL:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_control}
      APP_TENANT_BUSINESS_DB_ENGINE: ${APP_TENANT_BUSINESS_DB_ENGINE:-postgres}
      APP_TENANT_BUSINESS_POSTGRES_URL_TEMPLATE: ${APP_TENANT_BUSINESS_POSTGRES_URL_TEMPLATE:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_tenant_{tenantId}}
      APP_INIT_ADMIN_USERNAME: ${APP_INIT_ADMIN_USERNAME:-admin}
      APP_INIT_ADMIN_PASSWORD: ${APP_INIT_ADMIN_PASSWORD:-replace-with-a-strong-admin-password}
      APP_INIT_ADMIN_DISPLAY_NAME: ${APP_INIT_ADMIN_DISPLAY_NAME:-System Administrator}
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4300/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  sale-compass-worker:
    build:
      context: .
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: sale-compass-worker
    restart: unless-stopped
    command: ['npm', 'run', 'worker', '-w', 'server']
    depends_on:
      sale-compass:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_RUNTIME_MODE: ${APP_RUNTIME_MODE:-prod}
      APP_DEPLOYMENT_MODE: ${APP_DEPLOYMENT_MODE:-private}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_CONFIG_CIPHER_SECRET: ${APP_CONFIG_CIPHER_SECRET:-change-me-too}
      APP_BACKGROUND_JOBS_MODE: ${APP_BACKGROUND_JOBS_MODE:-worker}
      APP_QUEUE_BACKEND: ${APP_QUEUE_BACKEND:-redis}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_REDIS_PREFIX: ${APP_REDIS_PREFIX:-sale-compass}
      APP_DATA_ROOT: ${APP_DATA_ROOT:-/app/server/data}
      APP_DB_PATH: ${APP_DB_PATH:-/app/server/data/app.db}
      APP_LOG_ROOT: ${APP_LOG_ROOT:-/app/server/data/logs}
      APP_BACKUP_ROOT: ${APP_BACKUP_ROOT:-/app/server/data/backups}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/server/data/uploads}
      APP_ENABLE_DEMO_DATA: ${APP_ENABLE_DEMO_DATA:-false}
      APP_BUSINESS_DB_ENGINE: ${APP_BUSINESS_DB_ENGINE:-postgres}
      APP_BUSINESS_POSTGRES_URL: ${APP_BUSINESS_POSTGRES_URL:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_private}
      APP_CONTROL_PLANE_DB_ENGINE: ${APP_CONTROL_PLANE_DB_ENGINE:-postgres}
      APP_CONTROL_PLANE_POSTGRES_URL: ${APP_CONTROL_PLANE_POSTGRES_URL:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_control}
      APP_TENANT_BUSINESS_DB_ENGINE: ${APP_TENANT_BUSINESS_DB_ENGINE:-postgres}
      APP_TENANT_BUSINESS_POSTGRES_URL_TEMPLATE: ${APP_TENANT_BUSINESS_POSTGRES_URL_TEMPLATE:-postgres://sale_compass:replace-with-password@postgres:5432/sale_compass_tenant_{tenantId}}
    volumes:
      - ./server/data:/app/server/data

volumes:
  postgres-data:
  redis-data:
